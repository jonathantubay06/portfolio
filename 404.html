<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1"/>
<title>404 — Page Not Found | Jonathan Tubay</title>
<link rel="icon" type="image/png" href="/favicon.png"/>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#03080f;--cyan:#00d4ff;--text:#e8f4ff;--muted:#7b9ab0}
body{
  background:var(--bg);color:var(--text);
  font-family:'Plus Jakarta Sans',-apple-system,BlinkMacSystemFont,'Segoe UI',system-ui,sans-serif;
  min-height:100svh;display:flex;flex-direction:column;align-items:center;justify-content:center;
  text-align:center;padding:2rem;
}
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background:
    radial-gradient(ellipse 80% 60% at 15% 50%,rgba(14,122,255,0.07) 0%,transparent 100%),
    radial-gradient(ellipse 60% 50% at 85% 15%,rgba(0,212,255,0.055) 0%,transparent 100%);
}
.wrap{position:relative;z-index:1}
.code{
  font-family:'Orbitron','Arial Black',sans-serif;
  font-size:clamp(5rem,15vw,10rem);font-weight:900;
  color:var(--cyan);text-shadow:0 0 40px rgba(0,212,255,.4),0 0 80px rgba(0,212,255,.15);
  line-height:1;margin-bottom:.5rem;
}
h1{font-size:clamp(1.2rem,3vw,1.8rem);font-weight:700;margin-bottom:1rem;color:#fff}
p{color:var(--muted);font-size:1rem;margin-bottom:2rem;max-width:400px;line-height:1.7}
a{
  display:inline-flex;align-items:center;gap:.45rem;
  padding:.85rem 2rem;font-size:.88rem;font-weight:700;
  letter-spacing:.1em;text-transform:uppercase;text-decoration:none;
  background:linear-gradient(135deg,#0e7aff,#00d4ff);color:#000;
  border-radius:3px;box-shadow:0 4px 18px rgba(0,212,255,.28);
  transition:all .28s;
}
a:hover{box-shadow:0 7px 26px rgba(0,212,255,.48);transform:translateY(-2px)}
</style>
</head>
<body>
<div class="wrap">
  <div class="code">404</div>
  <h1>Lost in Space</h1>
  <p>The page you're looking for doesn't exist or has been moved. Let's get you back on track.</p>
  <a href="/">Back to Home</a>
</div>
</body>
</html>
